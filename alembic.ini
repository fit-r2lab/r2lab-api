[alembic]
script_location = alembic
# the database URL is read from R2LAB_DATABASE_URL env var in env.py;
# this line is only a fallback for the alembic CLI
sqlalchemy.url = postgresql://r2lab:r2lab@localhost:5432/r2lab

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
